# CITABELLA — Supabase local config
# See: https://supabase.com/docs/guides/cli/config

project_id = "citabella"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[auth]
enabled = true
site_url = "http://localhost:3004"
additional_redirect_urls = ["http://localhost:3004/auth/callback"]
enable_signup = false

[auth.email]
enable_signup = false
enable_confirmations = false
